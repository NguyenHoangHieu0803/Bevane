services:
  - type: web
    name: bevane
    runtime: node
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    healthCheckPath: /api/users
    envVars:
      - key: NODE_ENV
        value: production
      - key: BEVANE_DB
        value: /data/bevane.db
    disk:
      name: bevane-data
      mountPath: /data
      sizeGB: 1
